name: Commitlint

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize
      - reopened
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Lint conventional commit messages
        uses: wagoid/commitlint-github-action@v6
        with:
          helpURL: https://www.conventionalcommits.org/en/v1.0.0/
