name: "📊 Health"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * 1"

permissions:
  actions: read
  contents: read

jobs:
  health:
    name: "📈 Build health and size"
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: "📥 Check out repository"
        uses: actions/checkout@v6

      - name: "☕ Set up JDK 17"
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: "🤖 Set up Android SDK"
        uses: android-actions/setup-android@v3

      - name: "📦 Install Android platform 36"
        run: sdkmanager "platforms;android-36"

      - name: "🛠️ Set up Gradle"
        uses: gradle/actions/setup-gradle@v4

      - name: "🧪 Measure store impl JVM tests"
        id: store_tests
        run: |
          start=$(date +%s)
          ./gradlew :shared:core:store:impl:jvmTest
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: "📱 Measure Android debug build"
        id: android_build
        run: |
          start=$(date +%s)
          ./gradlew :androidApp:assembleDebug
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: "🍏 Measure shared iOS compile"
        id: ios_compile
        run: |
          start=$(date +%s)
          ./gradlew :shared:compileKotlinIosSimulatorArm64
          end=$(date +%s)
          echo "seconds=$((end-start))" >> "$GITHUB_OUTPUT"

      - name: "📦 Collect APK size"
        id: apk
        run: |
          apk_path="androidApp/build/outputs/apk/debug/androidApp-debug.apk"
          size_bytes=$(stat -c%s "$apk_path")
          size_mb=$(python - <<PY
          size = int("${size_bytes}")
          print(f"{size / (1024 * 1024):.2f} MB")
          PY
          )
          {
            echo "path=$apk_path"
            echo "size_bytes=$size_bytes"
            echo "size_human=$size_mb"
          } >> "$GITHUB_OUTPUT"

      - name: "📚 Collect repo stats"
        id: stats
        run: |
          modules=$(python - <<'PY'
          import pathlib
          text = pathlib.Path("settings.gradle.kts").read_text()
          print(text.count('include("'))
          PY
          )
          kotlin_files=$(find . -path '*/src/*' -name '*.kt' -not -path '*/build/*' | wc -l | tr -d ' ')
          swift_files=$(find iosApp -name '*.swift' | wc -l | tr -d ' ')
          version_name=$(grep '^kolo.version.name=' gradle.properties | cut -d= -f2)
          version_code=$(grep '^kolo.version.code=' gradle.properties | cut -d= -f2)
          {
            echo "modules=$modules"
            echo "kotlin_files=$kotlin_files"
            echo "swift_files=$swift_files"
            echo "version_name=$version_name"
            echo "version_code=$version_code"
          } >> "$GITHUB_OUTPUT"

      - name: "📉 Calculate rolling average"
        id: history
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python <<'PY'
          import json
          import os
          import urllib.request
          from datetime import datetime

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          run_id = int(os.environ["GITHUB_RUN_ID"])
          url = f"https://api.github.com/repos/{repo}/actions/workflows/health.yml/runs?branch=main&status=success&per_page=10"
          req = urllib.request.Request(
              url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )

          average = ""
          samples = "0"

          try:
              with urllib.request.urlopen(req) as response:
                  payload = json.load(response)

              durations = []
              for run in payload.get("workflow_runs", []):
                  if run.get("id") == run_id:
                      continue
                  started = run.get("run_started_at")
                  updated = run.get("updated_at")
                  if not started or not updated:
                      continue
                  started_at = datetime.fromisoformat(started.replace("Z", "+00:00"))
                  updated_at = datetime.fromisoformat(updated.replace("Z", "+00:00"))
                  durations.append((updated_at - started_at).total_seconds())

              if durations:
                  average = f"{sum(durations) / len(durations):.1f}s"
                  samples = str(len(durations))
          except Exception:
              average = ""
              samples = "0"

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as output:
              output.write(f"average={average}\n")
              output.write(f"samples={samples}\n")
          PY

      - name: "📝 Publish summary"
        if: always()
        env:
          STORE_TEST_SECONDS: ${{ steps.store_tests.outputs.seconds }}
          ANDROID_BUILD_SECONDS: ${{ steps.android_build.outputs.seconds }}
          IOS_COMPILE_SECONDS: ${{ steps.ios_compile.outputs.seconds }}
          APK_SIZE_HUMAN: ${{ steps.apk.outputs.size_human }}
          APK_SIZE_BYTES: ${{ steps.apk.outputs.size_bytes }}
          MODULE_COUNT: ${{ steps.stats.outputs.modules }}
          KOTLIN_FILE_COUNT: ${{ steps.stats.outputs.kotlin_files }}
          SWIFT_FILE_COUNT: ${{ steps.stats.outputs.swift_files }}
          VERSION_NAME: ${{ steps.stats.outputs.version_name }}
          VERSION_CODE: ${{ steps.stats.outputs.version_code }}
          AVERAGE_DURATION: ${{ steps.history.outputs.average }}
          AVERAGE_SAMPLES: ${{ steps.history.outputs.samples }}
        run: |
          mkdir -p build/health
          store="${STORE_TEST_SECONDS:-n/a}"
          android="${ANDROID_BUILD_SECONDS:-n/a}"
          ios="${IOS_COMPILE_SECONDS:-n/a}"
          apk_human="${APK_SIZE_HUMAN:-n/a}"
          apk_bytes="${APK_SIZE_BYTES:-n/a}"
          modules="${MODULE_COUNT:-n/a}"
          kotlin_files="${KOTLIN_FILE_COUNT:-n/a}"
          swift_files="${SWIFT_FILE_COUNT:-n/a}"
          version_name="${VERSION_NAME:-n/a}"
          version_code="${VERSION_CODE:-n/a}"

          if [[ "${STORE_TEST_SECONDS:-}" =~ ^[0-9]+$ ]] && [[ "${ANDROID_BUILD_SECONDS:-}" =~ ^[0-9]+$ ]] && [[ "${IOS_COMPILE_SECONDS:-}" =~ ^[0-9]+$ ]]; then
            total="$((STORE_TEST_SECONDS + ANDROID_BUILD_SECONDS + IOS_COMPILE_SECONDS))s"
          else
            total="n/a"
          fi

          {
            echo "## 📊 Project Health"
            echo
            echo "| Metric | Value |"
            echo "| --- | --- |"
            echo "| Store impl JVM tests | ${store} |"
            echo "| Android debug build | ${android} |"
            echo "| Shared iOS simulator compile | ${ios} |"
            echo "| Total measured time | ${total} |"
            if [ -n "$AVERAGE_DURATION" ]; then
              echo "| Rolling average on main | ${AVERAGE_DURATION} across ${AVERAGE_SAMPLES} runs |"
            else
              echo "| Rolling average on main | Not enough history yet |"
            fi
            echo "| APK size | ${apk_human} (${apk_bytes} bytes) |"
            echo "| Gradle modules | ${modules} |"
            echo "| Kotlin source files | ${kotlin_files} |"
            echo "| Swift source files | ${swift_files} |"
            echo "| Version | ${version_name} (${version_code}) |"
          } | tee build/health/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: "📤 Upload health summary"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-summary
          path: build/health/summary.md

      - name: "📤 Upload debug APK"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: androidApp/build/outputs/apk/debug/androidApp-debug.apk
          if-no-files-found: ignore
